diabetes:
  model_type: svc
  params:
    C: 1.0
    gamma: scale
    class_weight: balanced

heart_disease:
  model_type: random_forest
  params:
    n_estimators: 737
    max_depth: 4
    max_features: 0.25
    min_samples_split: 27
    min_samples_leaf: 16
    max_samples: 0.83
    bootstrap: true
    ccp_alpha: 0.0017